name: ${COMPOSE_PROJECT_NAME:-censo_psico_nr1}

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD nao definido}
      POSTGRES_DB: ${POSTGRES_DB:-censopsico}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-censopsico}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    image: ${APP_IMAGE:?APP_IMAGE nao definido}:${APP_IMAGE_TAG:-latest}
    restart: "no"
    pull_policy: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY nao definido}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-censopsico}
      SYSTEM_ADMIN_EMAIL: ${SYSTEM_ADMIN_EMAIL:-}
      SYSTEM_ADMIN_PASSWORD: ${SYSTEM_ADMIN_PASSWORD:-}
      SYSTEM_ADMIN_NAME: ${SYSTEM_ADMIN_NAME:-Administrador do Sistema}
      SYSTEM_ADMIN_COMPANY_NAME: ${SYSTEM_ADMIN_COMPANY_NAME:-Organizacao Inicial}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      RATELIMIT_STORAGE_URI: ${RATELIMIT_STORAGE_URI:-redis://redis:6379/0}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      REMEMBER_COOKIE_SECURE: ${REMEMBER_COOKIE_SECURE:-true}
      RUN_MIGRATIONS_ON_STARTUP: "false"
    command: ["flask", "db", "upgrade"]

  web:
    image: ${APP_IMAGE:?APP_IMAGE nao definido}:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped
    pull_policy: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY nao definido}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-censopsico}
      SYSTEM_ADMIN_EMAIL: ${SYSTEM_ADMIN_EMAIL:-}
      SYSTEM_ADMIN_PASSWORD: ${SYSTEM_ADMIN_PASSWORD:-}
      SYSTEM_ADMIN_NAME: ${SYSTEM_ADMIN_NAME:-Administrador do Sistema}
      SYSTEM_ADMIN_COMPANY_NAME: ${SYSTEM_ADMIN_COMPANY_NAME:-Organizacao Inicial}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RATELIMIT_STORAGE_URI: ${RATELIMIT_STORAGE_URI:-redis://redis:6379/0}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      REMEMBER_COOKIE_SECURE: ${REMEMBER_COOKIE_SECURE:-true}
      RUN_MIGRATIONS_ON_STARTUP: "false"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
  postgres_data:
  nginx_logs:
